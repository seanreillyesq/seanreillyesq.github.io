<!-- Navigation -->
<nav class="navbar navbar-expand-lg fixed-top{% if page.header-img %} navbar-transparent{% else %} bg-white border-bottom{% endif %}" id="mainNav">
    <div class="container">
        <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{{ site.baseurl }}/">Home</a>
                </li>
                {% for p in site.pages %}{% if p.title %}{% unless p.hidden or p.layout == 'archive' or p.url contains '/page/' or p.url == '/' or p.url == '/index.html' %}
                <li class="nav-item">
                    <a class="nav-link" href="{{ p.url | prepend: site.baseurl }}">{{ p.menu | default: p.title }}</a>
                </li>
                {% endunless %}{% endif %}{% endfor %}
            </ul>
        </div>
    </div>
</nav>
