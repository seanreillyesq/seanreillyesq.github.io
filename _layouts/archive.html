---
layout: default
---

<header class="intro-header" style="background-image: url('{{ site.baseurl }}/img/home-bg.jpg')">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 offset-lg-2 col-md-10 offset-md-1">
                <div class="site-heading">
                    <h1>{{ page.title }}</h1>
                    <hr class="small">
                    <span class="subheading">{{ page.type | capitalize }}: {{ page.title }}</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <p class="font-mono text-uppercase text-center mb-4 small" style="letter-spacing: 2px; color: var(--color-text-muted);">{{ page.posts | size }} post{% if page.posts.size != 1 %}s{% endif %}</p>

    <div class="row g-4">
        {% for post in page.posts %}
        <div class="col-md-6 col-lg-4">
            {% include post-card.html post=post %}
        </div>
        {% endfor %}
    </div>
</div>
