---
layout: default
---

<!-- Post Header -->
<header class="intro-header{% if page.header_overlay %} has-overlay{% endif %}" style="background-image: url('{{ site.baseurl }}/{{ page.header-img }}');">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 offset-lg-2 col-md-10 offset-md-1">
                <div class="post-heading"{% if page.header_text_color %} style="color: {{ page.header_text_color }};"{% endif %}>
                    <h1>{{ page.title }}</h1>
                    {% if page.subtitle %}
                    <h2 class="subheading">{{ page.subtitle }}</h2>
                    {% endif %}
                    <span class="meta">Posted by {{ page.author }} on {{ page.date | date: "%B %-d, %Y" }}</span>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Post Content -->
<article>
    <div class="container">
        <div class="row">
            <div class="col-lg-8 offset-lg-2 col-md-10 offset-md-1">

                {{ content }}

                <div class="post-nav">
                    {% if page.previous.url %}
                    <a href="{{ page.previous.url | prepend: site.baseurl | replace: '//', '/' }}">&larr; Previous Post</a>
                    {% endif %}
                    {% if page.next.url %}
                    <a href="{{ page.next.url | prepend: site.baseurl | replace: '//', '/' }}" class="post-nav-next">Next Post &rarr;</a>
                    {% endif %}
                </div>

            </div>
        </div>
    </div>
</article>
